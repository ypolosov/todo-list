name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx prettier --check 'src/**/*.{ts,tsx,css}' '*.md'
      - run: npx eslint 'src/**/*.{ts,tsx}'
      - run: npx vitest run --coverage
